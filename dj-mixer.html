<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivam · DJ Mixer Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text: #3a2330;
            --text-soft: #5d4155;
            --text-muted: #9b7b8a;
            --card-bg: rgba(255,245,250,0.55);
            --card-border: rgba(255,220,230,0.6);
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Quicksand', sans-serif;
            --accent: #e894a8;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-sans);
            background: radial-gradient(ellipse at 30% 40%, #ffeef4, #f3e2f0, #e1dff8, #dcedf8);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(200,130,150,0.1);
            padding: 2.5rem;
            width: 100%;
            max-width: 1300px;
            margin-bottom: 2rem;
        }
        h1 {
            font-family: var(--font-serif);
            font-size: 2.8rem;
            text-align: center;
            color: #4d2c3b;
            margin-bottom: 0.3rem;
        }
        .subtitle {
            text-align: center;
            color: var(--text-soft);
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .decks {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .deck {
            background: rgba(255,245,248,0.5);
            border: 1px solid rgba(255,220,230,0.6);
            border-radius: 32px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
        }
        .deck h3 {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            color: #4d2c3b;
            margin-bottom: 1rem;
        }

        .search-box {
            position: relative;
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid rgba(220,150,170,0.4);
            background: rgba(255,245,248,0.7);
            font-family: var(--font-sans);
            font-size: 0.9rem;
            outline: none;
        }
        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(230,130,155,.1);
        }
        .btn-sm {
            padding: 12px 18px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(145deg,#fad1dd,#f7bacb);
            color: #442433;
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }
        .btn-sm:hover { background: linear-gradient(145deg,#fadce6,#f8c0d2); }

        .search-results {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(255,250,252,0.9);
            border: 1px solid rgba(220,150,170,0.3);
            border-radius: 20px;
            margin-bottom: 1rem;
            display: none;
            padding: 0.5rem;
        }
        .result-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.6rem;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .result-item:hover { background: rgba(255,210,225,0.5); }
        .result-item.active { background: rgba(255,180,200,0.4); border: 1px solid var(--accent); }
        .result-item img { width: 72px; height: 40px; border-radius: 8px; object-fit: cover; }
        .result-item .info { flex: 1; min-width: 0; }
        .result-item .title { font-size: 0.9rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .result-item .channel { font-size: 0.75rem; color: var(--text-muted); }

        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 0.8rem;
            background: #000;
            min-height: 0;
        }
        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ========== CONTROLS ========== */
        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background: rgba(255,240,245,0.5);
            border-radius: 32px;
            padding: 1.5rem;
        }

        .volume-mute-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .vol-group {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex: 1;
            min-width: 180px;
        }
        .vol-group label {
            font-weight: 600;
            color: var(--text-soft);
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .vol-group input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
        }
        .vol-group .slider-value {
            font-weight: 600;
            color: #4d2c3b;
            min-width: 45px;
            text-align: right;
            font-size: 0.85rem;
        }
        .mute-btn {
            background: rgba(255,220,230,0.5);
            border: 1px solid rgba(220,150,170,0.5);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            flex-shrink: 0;
        }
        .mute-btn.muted {
            background: rgba(200,150,150,0.5);
            border-color: #c44;
        }

        /* Crossfader */
        .crossfader-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .crossfader-section span {
            font-weight: 600;
            color: var(--text-soft);
            font-size: 0.9rem;
        }
        .crossfader-section input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
        }
        .crossfader-section .fade-label {
            font-weight: 600;
            color: #4d2c3b;
            min-width: 80px;
            text-align: center;
            font-size: 0.9rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: var(--text-soft);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 20px;
            border-radius: 50px;
            background: rgba(255,220,230,.3);
            transition: 0.3s;
        }
        .back-link:hover { background: rgba(255,190,205,.5); color: #4d2c3b; }

        @media (max-width: 800px) {
            .decks { grid-template-columns: 1fr; }
            .volume-mute-row { flex-direction: column; align-items: stretch; }
            .vol-group { min-width: auto; }
            .glass-card { padding: 1.5rem; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>🎧 DJ Mixer Pro</h1>
        <p class="subtitle">Search YouTube, load two tracks, crossfade &amp; mute.</p>

        <!-- Decks -->
        <div class="decks">
            <!-- Deck A -->
            <div class="deck">
                <h3>🎵 Track A</h3>
                <div class="search-box">
                    <input type="text" id="searchA" placeholder="Search..." onkeydown="if(event.key==='Enter') search('A')">
                    <button class="btn-sm" onclick="search('A')">🔍</button>
                </div>
                <div class="search-results" id="resultsA"></div>
                <div class="player-wrapper" id="playerA"></div>
            </div>

            <!-- Deck B -->
            <div class="deck">
                <h3>🎵 Track B</h3>
                <div class="search-box">
                    <input type="text" id="searchB" placeholder="Search..." onkeydown="if(event.key==='Enter') search('B')">
                    <button class="btn-sm" onclick="search('B')">🔍</button>
                </div>
                <div class="search-results" id="resultsB"></div>
                <div class="player-wrapper" id="playerB"></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-section">
            <!-- Volume + Mute Row -->
            <div class="volume-mute-row">
                <div class="vol-group">
                    <label>🔊 Vol A</label>
                    <input type="range" id="volA" min="0" max="100" value="100" oninput="updateAllVolumes()">
                    <span class="slider-value" id="volAVal">100%</span>
                </div>
                <button class="mute-btn" id="muteABtn" onclick="toggleMute('A')">🔊</button>

                <div class="vol-group">
                    <label>🔊 Vol B</label>
                    <input type="range" id="volB" min="0" max="100" value="100" oninput="updateAllVolumes()">
                    <span class="slider-value" id="volBVal">100%</span>
                </div>
                <button class="mute-btn" id="muteBBtn" onclick="toggleMute('B')">🔊</button>
            </div>

            <!-- Crossfader -->
            <div class="crossfader-section">
                <span>◀ A</span>
                <input type="range" id="crossfader" min="0" max="100" value="50" oninput="updateAllVolumes()">
                <span>B ▶</span>
                <span class="fade-label" id="fadeLabel">Center</span>
            </div>
        </div>
    </div>

    <a href="portfolio.html" class="back-link">← back to portfolio</a>

    <script>
        let players = { A: null, B: null };
        let currentVideo = { A: null, B: null };
        let muted = { A: false, B: false };

        function onYouTubeIframeAPIReady() {
            players.A = new YT.Player('playerA', {
                height: '100%', width: '100%',
                playerVars: { 'controls': 1, 'autoplay': 0 }
            });
            players.B = new YT.Player('playerB', {
                height: '100%', width: '100%',
                playerVars: { 'controls': 1, 'autoplay': 0 }
            });
            setTimeout(() => updateAllVolumes(), 500);
        }

        function toggleMute(side) {
            muted[side] = !muted[side];
            const btn = document.getElementById('mute' + side + 'Btn');
            if (muted[side]) {
                btn.textContent = '🔇';
                btn.classList.add('muted');
            } else {
                btn.textContent = '🔊';
                btn.classList.remove('muted');
            }
            updateAllVolumes();
        }

        // Fresh Crossfade Logic:
        // Leftmost = Only A (full), Rightmost = Only B (full), Center = Both Full
        function calculateCrossfadeVolumes() {
            const volA = parseInt(document.getElementById('volA').value) || 100;
            const volB = parseInt(document.getElementById('volB').value) || 100;
            const cross = parseInt(document.getElementById('crossfader').value) || 50;

            let leftGain, rightGain;

            if (cross <= 50) {
                // Left side: A full, B fades from 0 to full
                leftGain = 1;
                rightGain = cross / 50;
            } else {
                // Right side: B full, A fades from full to 0
                leftGain = 1 - (cross - 50) / 50;
                rightGain = 1;
            }

            const effectiveA = volA * leftGain;
            const effectiveB = volB * rightGain;

            return { effectiveA, effectiveB, cross };
        }

        function updateAllVolumes() {
            const { effectiveA, effectiveB, cross } = calculateCrossfadeVolumes();

            const finalA = muted.A ? 0 : effectiveA;
            const finalB = muted.B ? 0 : effectiveB;

            if (players.A && typeof players.A.setVolume === 'function') players.A.setVolume(finalA);
            if (players.B && typeof players.B.setVolume === 'function') players.B.setVolume(finalB);

            // Update displays
            document.getElementById('volAVal').textContent = muted.A ? 'MUTED' : (document.getElementById('volA').value + '%');
            document.getElementById('volBVal').textContent = muted.B ? 'MUTED' : (document.getElementById('volB').value + '%');

            // Friendly label
            const fadeLabel = document.getElementById('fadeLabel');
            if (cross <= 3) fadeLabel.textContent = 'Track A Only';
            else if (cross >= 97) fadeLabel.textContent = 'Track B Only';
            else if (cross >= 47 && cross <= 53) fadeLabel.textContent = 'Both Full';
            else if (cross < 50) fadeLabel.textContent = 'A > B';
            else fadeLabel.textContent = 'B > A';
        }

        // Search
        async function search(side) {
            const query = document.getElementById('search' + side).value.trim();
            if (!query) return;
            const resultsDiv = document.getElementById('results' + side);
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = '<div class="result-item"><div class="info"><div class="title">Searching...</div></div></div>';
            try {
                const res = await fetch(`/api/yt-search?action=search&query=${encodeURIComponent(query)}&maxResults=10`);
                const data = await res.json();
                if (data.error) {
                    resultsDiv.innerHTML = `<div class="result-item"><div class="info"><div class="title">⚠️ ${data.error}</div></div></div>`;
                    return;
                }
                if (!data.videos || data.videos.length === 0) {
                    resultsDiv.innerHTML = '<div class="result-item"><div class="info"><div class="title">No results found</div></div></div>';
                    return;
                }
                renderResults(data.videos, resultsDiv, side);
            } catch (e) {
                resultsDiv.innerHTML = '<div class="result-item"><div class="info"><div class="title">Search failed.</div></div></div>';
            }
        }

        function renderResults(videos, container, side) {
            container.innerHTML = '';
            videos.forEach(video => {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <img src="${video.thumbnail}" alt="">
                    <div class="info">
                        <div class="title">${video.title}</div>
                        <div class="channel">${video.channel}</div>
                    </div>
                `;
                item.onclick = () => {
                    loadVideo(side, video.id);
                    container.querySelectorAll('.result-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                };
                container.appendChild(item);
            });
        }

        function loadVideo(side, videoId) {
            currentVideo[side] = videoId;
            if (players[side] && players[side].loadVideoById) {
                players[side].loadVideoById(videoId);
            }
            document.getElementById('results' + side).style.display = 'none';
        }

        window.addEventListener('load', () => updateAllVolumes());
    </script>

    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
