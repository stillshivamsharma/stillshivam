<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivam · DJ Mixer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text:#3a2330;
            --text-soft:#5d4155;
            --text-muted:#9b7b8a;
            --card-bg:rgba(255,245,250,0.55);
            --card-border:rgba(255,220,230,0.6);
            --font-serif:'Cormorant Garamond',serif;
            --font-sans:'Quicksand',sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:var(--font-sans);
            background: radial-gradient(ellipse at 30% 40%,#ffeef4,#f3e2f0,#e1dff8,#dcedf8);
            min-height:100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(200,130,150,0.1);
            padding: 2.5rem;
            width: 100%;
            max-width: 1200px;
        }
        h1 {
            font-family: var(--font-serif);
            font-size: 2.8rem;
            text-align: center;
            color:#4d2c3b;
            margin-bottom: 0.4rem;
        }
        .subtitle {
            text-align: center;
            color: var(--text-soft);
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .players-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .player-card {
            background: rgba(255,245,248,0.5);
            border: 1px solid rgba(255,220,230,0.6);
            border-radius: 32px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
        }
        .player-card h3 {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            color: #4d2c3b;
            margin-bottom: 0.8rem;
        }

        .search-box {
            position: relative;
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }
        .search-box input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 30px;
            border: 1px solid rgba(220,150,170,0.4);
            background: rgba(255,245,248,0.7);
            font-family: var(--font-sans);
            font-size: 0.9rem;
            outline: none;
        }
        .search-box input:focus {
            border-color: #e894a8;
            box-shadow: 0 0 0 4px rgba(230,130,155,.1);
        }
        .btn-sm {
            padding: 10px 18px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(145deg,#fad1dd,#f7bacb);
            color: #442433;
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }
        .btn-sm:hover {
            background: linear-gradient(145deg,#fadce6,#f8c0d2);
        }
        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 70px;
            background: rgba(255,250,252,0.98);
            border: 1px solid rgba(220,150,170,0.4);
            border-radius: 16px;
            max-height: 180px;
            overflow-y: auto;
            z-index: 50;
            margin-top: 4px;
            display: none;
        }
        .suggestion-item {
            padding: 8px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-soft);
            border-bottom: 1px solid rgba(220,150,170,0.1);
        }
        .suggestion-item:hover {
            background: rgba(255,210,225,0.5);
        }

        .player-card iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 16px;
            border: none;
        }
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            max-height: 180px;
            overflow-y: auto;
            margin-top: 0.8rem;
        }
        .video-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem;
            border-radius: 14px;
            cursor: pointer;
            background: rgba(255,245,248,0.5);
            transition: 0.2s;
        }
        .video-item:hover {
            background: rgba(255,210,225,0.6);
        }
        .video-item.active {
            background: rgba(255,180,200,0.5);
            border: 1px solid #e894a8;
        }
        .video-item img {
            width: 64px;
            height: 36px;
            border-radius: 8px;
            object-fit: cover;
        }
        .video-item .info {
            flex: 1;
            min-width: 0;
        }
        .video-item .title {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .video-item .channel {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .section-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin: 0.6rem 0 0.2rem;
        }

        .controls-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            background: rgba(255,245,248,0.4);
            border-radius: 32px;
            padding: 1.5rem 1rem;
            margin-top: 1rem;
        }
        .control-group {
            text-align: center;
            flex: 1;
            min-width: 100px;
        }
        .control-group label {
            display: block;
            font-weight: 600;
            color: var(--text-soft);
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }
        .control-group input[type="range"] {
            width: 100%;
            accent-color: #e894a8;
        }
        .control-value {
            font-weight: 600;
            color: #4d2c3b;
            margin-top: 0.3rem;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-soft);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 20px;
            border-radius: 50px;
            background: rgba(255,220,230,.3);
            transition: 0.3s;
        }
        .back-link:hover {
            background: rgba(255,190,205,.5);
            color: #4d2c3b;
        }

        @media (max-width: 800px) {
            .players-grid {
                grid-template-columns: 1fr;
            }
            .controls-row {
                flex-direction: column;
            }
            .glass-card {
                padding: 1.5rem;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>🎧 DJ Mixer Pro</h1>
        <p class="subtitle">Search YouTube, load two tracks, crossfade between them.</p>

        <div class="players-grid">
            <div class="player-card">
                <h3>🎵 Track A</h3>
                <div class="search-box">
                    <input type="text" id="searchA" placeholder="Search for Track A..." autocomplete="off"
                           oninput="autocomplete('A')" onkeydown="if(event.key==='Enter')search('A')">
                    <button class="btn-sm" onclick="search('A')">🔍</button>
                    <div class="suggestions-dropdown" id="suggestionsA"></div>
                </div>
                <div id="leftPlayer"></div>
                <div class="section-label">🔍 Results</div>
                <div class="video-list" id="resultsA"></div>
                <div class="section-label">🔗 Related</div>
                <div class="video-list" id="relatedA"></div>
            </div>

            <div class="player-card">
                <h3>🎵 Track B</h3>
                <div class="search-box">
                    <input type="text" id="searchB" placeholder="Search for Track B..." autocomplete="off"
                           oninput="autocomplete('B')" onkeydown="if(event.key==='Enter')search('B')">
                    <button class="btn-sm" onclick="search('B')">🔍</button>
                    <div class="suggestions-dropdown" id="suggestionsB"></div>
                </div>
                <div id="rightPlayer"></div>
                <div class="section-label">🔍 Results</div>
                <div class="video-list" id="resultsB"></div>
                <div class="section-label">🔗 Related</div>
                <div class="video-list" id="relatedB"></div>
            </div>
        </div>

        <div class="controls-row">
            <div class="control-group">
                <label>🔊 Volume A</label>
                <input type="range" id="leftVolume" min="0" max="100" value="100" oninput="updateVolume()">
                <div class="control-value" id="leftVolDisplay">100%</div>
            </div>
            <div class="control-group">
                <label>🎚️ Crossfader</label>
                <input type="range" id="crossfader" min="0" max="100" value="50" oninput="crossfade()">
                <div class="control-value" id="fadeLabel">Center</div>
            </div>
            <div class="control-group">
                <label>🔊 Volume B</label>
                <input type="range" id="rightVolume" min="0" max="100" value="100" oninput="updateVolume()">
                <div class="control-value" id="rightVolDisplay">100%</div>
            </div>
            <div class="control-group">
                <label>🎛️ Master</label>
                <input type="range" id="masterVolume" min="0" max="100" value="80" oninput="updateMaster()">
                <div class="control-value" id="masterVolDisplay">80%</div>
            </div>
        </div>
    </div>

    <a href="portfolio.html" class="back-link">← back to portfolio</a>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        var leftPlayer, rightPlayer;
        var currentVideoA = null, currentVideoB = null;
        var autocompleteTimer = {};

        function onYouTubeIframeAPIReady() {
            leftPlayer = new YT.Player('leftPlayer', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'controls': 1, 'autoplay': 0 },
                events: {
                    'onStateChange': function(e) {
                        if (e.data === 1 && currentVideoA) loadRelated('A');
                    }
                }
            });
            rightPlayer = new YT.Player('rightPlayer', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'controls': 1, 'autoplay': 0 },
                events: {
                    'onStateChange': function(e) {
                        if (e.data === 1 && currentVideoB) loadRelated('B');
                    }
                }
            });
        }

        async function autocomplete(side) {
            const query = document.getElementById('search' + side).value.trim();
            const dropdown = document.getElementById('suggestions' + side);
            if (query.length < 2) { dropdown.style.display = 'none'; return; }
            clearTimeout(autocompleteTimer[side]);
            autocompleteTimer[side] = setTimeout(async () => {
                try {
                    const res = await fetch(`https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    const suggestions = data[1] || [];
                    if (suggestions.length === 0) { dropdown.style.display = 'none'; return; }
                    dropdown.innerHTML = suggestions.map(s =>
                        `<div class="suggestion-item" onclick="selectSuggestion('${side}','${s.replace(/'/g, "\\'")}')">${s}</div>`
                    ).join('');
                    dropdown.style.display = 'block';
                } catch (e) {
                    dropdown.style.display = 'none';
                }
            }, 300);
        }

        function selectSuggestion(side, text) {
            document.getElementById('search' + side).value = text;
            document.getElementById('suggestions' + side).style.display = 'none';
            search(side);
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-box')) {
                document.querySelectorAll('.suggestions-dropdown').forEach(d => d.style.display = 'none');
            }
        });

        async function search(side) {
            const query = document.getElementById('search' + side).value.trim();
            if (!query) return;
            document.getElementById('suggestions' + side).style.display = 'none';

            const resultsDiv = document.getElementById('results' + side);
            resultsDiv.innerHTML = '<div class="video-item"><div class="info"><div class="title">Searching...</div></div></div>';

            try {
                const response = await fetch(`/api/yt-search?action=search&query=${encodeURIComponent(query)}&maxResults=6`);
                const data = await response.json();
                if (data.error) {
                    resultsDiv.innerHTML = `<div class="video-item"><div class="info"><div class="title">⚠️ ${data.error}</div></div></div>`;
                    return;
                }
                renderVideoList(data.videos, resultsDiv, side);
            } catch (e) {
                resultsDiv.innerHTML = '<div class="video-item"><div class="info"><div class="title">Search failed.</div></div></div>';
            }
        }

        async function loadRelated(side) {
            const currentId = side === 'A' ? currentVideoA : currentVideoB;
            if (!currentId) return;
            const relatedDiv = document.getElementById('related' + side);
            relatedDiv.innerHTML = '<div class="video-item"><div class="info"><div class="title">Loading...</div></div></div>';
            try {
                const response = await fetch(`/api/yt-search?action=related&relatedTo=${currentId}&maxResults=6`);
                const data = await response.json();
                if (data.error || !data.videos) { relatedDiv.innerHTML = ''; return; }
                renderVideoList(data.videos, relatedDiv, side);
            } catch (e) {
                relatedDiv.innerHTML = '';
            }
        }

        function renderVideoList(videos, container, side) {
            container.innerHTML = '';
            videos.forEach((video, index) => {
                const el = document.createElement('div');
                el.className = 'video-item';
                el.innerHTML = `
                    <img src="${video.thumbnail}" alt="">
                    <div class="info">
                        <div class="title">${video.title}</div>
                        <div class="channel">${video.channel}</div>
                    </div>
                `;
                el.onclick = function() {
                    if (side === 'A') {
                        currentVideoA = video.id;
                        if (leftPlayer && leftPlayer.loadVideoById) leftPlayer.loadVideoById(video.id);
                    } else {
                        currentVideoB = video.id;
                        if (rightPlayer && rightPlayer.loadVideoById) rightPlayer.loadVideoById(video.id);
                    }
                    container.querySelectorAll('.video-item').forEach(e => e.classList.remove('active'));
                    el.classList.add('active');
                };
                container.appendChild(el);
                if (index === 0) {
                    setTimeout(() => el.click(), 400);
                }
            });
        }

        function crossfade() {
            const cfValue = document.getElementById('crossfader').value;
            const leftVol = (100 - cfValue) / 100;
            const rightVol = cfValue / 100;
            if (leftPlayer && leftPlayer.setVolume) leftPlayer.setVolume(leftVol * 100);
            if (rightPlayer && rightPlayer.setVolume) rightPlayer.setVolume(rightVol * 100);
            document.getElementById('fadeLabel').textContent = cfValue < 30 ? 'Track A ⬆️' : (cfValue > 70 ? 'Track B ⬆️' : 'Center');
            document.getElementById('leftVolDisplay').textContent = Math.round(leftVol * 100) + '%';
            document.getElementById('rightVolDisplay').textContent = Math.round(rightVol * 100) + '%';
        }

        function updateVolume() {
            const lv = document.getElementById('leftVolume').value;
            const rv = document.getElementById('rightVolume').value;
            if (leftPlayer && leftPlayer.setVolume) leftPlayer.setVolume(lv);
            if (rightPlayer && rightPlayer.setVolume) rightPlayer.setVolume(rv);
            document.getElementById('leftVolDisplay').textContent = lv + '%';
            document.getElementById('rightVolDisplay').textContent = rv + '%';
        }

        function updateMaster() {
            const mv = document.getElementById('masterVolume').value;
            document.getElementById('masterVolDisplay').textContent = mv + '%';
            const lv = document.getElementById('leftVolume').value;
            const rv = document.getElementById('rightVolume').value;
            if (leftPlayer && leftPlayer.setVolume) leftPlayer.setVolume(Math.round(lv * mv / 100));
            if (rightPlayer && rightPlayer.setVolume) rightPlayer.setVolume(Math.round(rv * mv / 100));
        }
    </script>
</body>
</html>
