<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivam · DJ Mixer Pro</title>
    <meta name="description" content="Professional DJ Mixer - Crossfade between two YouTube tracks with volume control and mute.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text: #3a2330;
            --text-soft: #5d4155;
            --text-muted: #9b7b8a;
            --card-bg: rgba(255,245,250,0.55);
            --card-border: rgba(255,220,230,0.6);
            --card-hover: rgba(255,235,240,0.7);
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Quicksand', sans-serif;
            --accent: #e894a8;
            --accent-dark: #d4788e;
            --shadow: 0 15px 30px rgba(200,130,150,0.1);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: radial-gradient(ellipse at 30% 40%, #ffeef4, #f3e2f0, #e1dff8, #dcedf8);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========== MAIN CARD ========== */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px;
            box-shadow: var(--shadow), 0 0 80px rgba(255,180,200,0.08);
            padding: 2.5rem;
            width: 100%;
            max-width: 1300px;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 2.8rem;
            text-align: center;
            color: #4d2c3b;
            margin-bottom: 0.3rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-soft);
            margin-bottom: 2rem;
            font-size: 1rem;
            font-weight: 400;
        }

        /* ========== DECKS GRID ========== */
        .decks {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .deck {
            background: rgba(255,245,248,0.5);
            border: 1px solid rgba(255,220,230,0.6);
            border-radius: 32px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            transition: border-color 0.3s ease;
        }

        .deck:hover {
            border-color: var(--accent);
        }

        .deck h3 {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            color: #4d2c3b;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        /* ========== SEARCH ========== */
        .search-box {
            position: relative;
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid rgba(220,150,170,0.4);
            background: rgba(255,245,248,0.7);
            font-family: var(--font-sans);
            font-size: 0.9rem;
            outline: none;
            color: var(--text);
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            background: rgba(255,235,240,0.7);
            box-shadow: 0 0 0 4px rgba(230,130,155,0.1);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        .btn-sm {
            padding: 12px 18px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(145deg, #fad1dd, #f7bacb);
            color: #442433;
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .btn-sm:hover {
            background: linear-gradient(145deg, #fadce6, #f8c0d2);
            transform: translateY(-1px);
        }

        .btn-sm:active {
            transform: scale(0.97);
        }

        /* ========== SEARCH RESULTS ========== */
        .search-results {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(255,250,252,0.95);
            border: 1px solid rgba(220,150,170,0.3);
            border-radius: 20px;
            margin-bottom: 1rem;
            display: none;
            padding: 0.5rem;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .search-results::-webkit-scrollbar {
            width: 6px;
        }

        .search-results::-webkit-scrollbar-track {
            background: transparent;
        }

        .search-results::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        .result-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.6rem;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .result-item:hover {
            background: rgba(255,210,225,0.5);
        }

        .result-item.active {
            background: rgba(255,180,200,0.4);
            border: 1px solid var(--accent);
        }

        .result-item img {
            width: 72px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .result-item .info {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        .result-item .title {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-item .channel {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ========== PLAYER ========== */
        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 16px;
            overflow: hidden;
            background: #1a1a1a;
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ========== CONTROLS SECTION ========== */
        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background: rgba(255,240,245,0.45);
            border: 1px solid rgba(255,220,230,0.4);
            border-radius: 32px;
            padding: 1.5rem;
        }

        /* ========== VOLUME + MUTE ========== */
        .volume-mute-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .vol-group {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex: 1;
            min-width: 180px;
        }

        .vol-group label {
            font-weight: 600;
            color: var(--text-soft);
            font-size: 0.85rem;
            white-space: nowrap;
            letter-spacing: 0.3px;
            min-width: 50px;
        }

        .vol-group input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
            height: 6px;
            cursor: pointer;
        }

        .vol-group .slider-value {
            font-weight: 600;
            color: #4d2c3b;
            min-width: 50px;
            text-align: right;
            font-size: 0.85rem;
        }

        .mute-btn {
            background: rgba(255,220,230,0.5);
            border: 1px solid rgba(220,150,170,0.5);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            flex-shrink: 0;
            user-select: none;
        }

        .mute-btn:hover {
            background: rgba(255,200,215,0.7);
            transform: scale(1.05);
        }

        .mute-btn.muted {
            background: rgba(200,150,150,0.5);
            border-color: #c44;
            color: #8b0000;
        }

        /* ========== CROSSFADER ========== */
        .crossfader-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .crossfader-section span {
            font-weight: 600;
            color: var(--text-soft);
            font-size: 0.9rem;
            user-select: none;
        }

        .crossfader-section input[type="range"] {
            flex: 1;
            accent-color: var(--accent-dark);
            height: 8px;
            cursor: pointer;
        }

        .crossfader-section .fade-label {
            font-weight: 600;
            color: #4d2c3b;
            min-width: 100px;
            text-align: center;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }

        /* ========== MASTER ========== */
        .master-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(220,150,170,0.2);
        }

        .master-row label {
            font-weight: 600;
            color: var(--text-soft);
            font-size: 0.85rem;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .master-row input[type="range"] {
            flex: 1;
            accent-color: var(--accent-dark);
            height: 8px;
            cursor: pointer;
        }

        .master-row .slider-value {
            font-weight: 600;
            color: #4d2c3b;
            min-width: 50px;
            text-align: right;
            font-size: 0.85rem;
        }

        /* ========== BACK LINK ========== */
        .back-link {
            display: inline-block;
            margin-top: 0.5rem;
            color: var(--text-soft);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 20px;
            border-radius: 50px;
            background: rgba(255,220,230,0.3);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255,190,205,0.5);
            color: #4d2c3b;
            transform: translateY(-1px);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 900px) {
            .decks {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .volume-mute-row {
                flex-direction: column;
                align-items: stretch;
                gap: 0.8rem;
            }

            .vol-group {
                min-width: auto;
            }

            .glass-card {
                padding: 1.5rem;
                border-radius: 32px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .mute-btn {
                align-self: center;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .glass-card {
                padding: 1rem;
            }

            .deck {
                padding: 0.8rem;
            }

            .search-box input {
                font-size: 0.8rem;
                padding: 10px 14px;
            }

            .btn-sm {
                padding: 10px 14px;
                font-size: 0.8rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            .crossfader-section .fade-label {
                min-width: 80px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== MAIN CONTAINER ==================== -->
    <div class="glass-card">

        <h1>🎧 DJ Mixer Pro</h1>
        <p class="subtitle">Search YouTube, load two tracks, crossfade &amp; mix.</p>

        <!-- ==================== DECKS ==================== -->
        <div class="decks">

            <!-- ========== DECK A ========== -->
            <div class="deck" id="deckA">
                <h3>🎵 Track A</h3>
                <div class="search-box">
                    <input type="text" id="searchA" placeholder="Search for a song..." aria-label="Search Track A" onkeydown="if(event.key==='Enter')search('A')">
                    <button class="btn-sm" onclick="search('A')" aria-label="Search">🔍</button>
                </div>
                <div class="search-results" id="resultsA"></div>
                <div class="player-wrapper" id="playerA"></div>
            </div>

            <!-- ========== DECK B ========== -->
            <div class="deck" id="deckB">
                <h3>🎵 Track B</h3>
                <div class="search-box">
                    <input type="text" id="searchB" placeholder="Search for a song..." aria-label="Search Track B" onkeydown="if(event.key==='Enter')search('B')">
                    <button class="btn-sm" onclick="search('B')" aria-label="Search">🔍</button>
                </div>
                <div class="search-results" id="resultsB"></div>
                <div class="player-wrapper" id="playerB"></div>
            </div>

        </div>

        <!-- ==================== CONTROLS ==================== -->
        <div class="controls-section">

            <!-- Volume + Mute -->
            <div class="volume-mute-row">
                <!-- Volume A -->
                <div class="vol-group">
                    <label for="volA">🔊 A</label>
                    <input type="range" id="volA" min="0" max="100" value="100" oninput="updateAllVolumes()" aria-label="Volume A">
                    <span class="slider-value" id="volAVal">100%</span>
                </div>
                <button class="mute-btn" id="muteABtn" onclick="toggleMute('A')" aria-label="Mute Track A">🔊</button>

                <!-- Volume B -->
                <div class="vol-group">
                    <label for="volB">🔊 B</label>
                    <input type="range" id="volB" min="0" max="100" value="100" oninput="updateAllVolumes()" aria-label="Volume B">
                    <span class="slider-value" id="volBVal">100%</span>
                </div>
                <button class="mute-btn" id="muteBBtn" onclick="toggleMute('B')" aria-label="Mute Track B">🔊</button>
            </div>

            <!-- Crossfader -->
            <div class="crossfader-section">
                <span>◀ A</span>
                <input type="range" id="crossfader" min="0" max="100" value="50" oninput="updateAllVolumes()" aria-label="Crossfader">
                <span>B ▶</span>
                <span class="fade-label" id="fadeLabel">Center</span>
            </div>

            <!-- Master Volume -->
            <div class="master-row">
                <label for="masterVol">🎛️ Master</label>
                <input type="range" id="masterVol" min="0" max="100" value="90" oninput="updateAllVolumes()" aria-label="Master Volume">
                <span class="slider-value" id="masterVal">90%</span>
            </div>

        </div>
    </div>

    <!-- Back Link -->
    <a href="portfolio.html" class="back-link" aria-label="Back to Portfolio">← back to portfolio</a>

    <!-- ==================== SCRIPTS ==================== -->
    <script>
        /**
         * DJ Mixer Pro - Advanced JavaScript Logic
         * Zero-global-pollution, fully defensive, error-safe
         */

        // Player references
        const players = Object.create(null);
        const muted = Object.create(null);
        muted.A = false;
        muted.B = false;

        /**
         * YouTube API Callback
         * Called automatically when iframe API loads
         */
        function onYouTubeIframeAPIReady() {
            try {
                players.A = new YT.Player('playerA', {
                    height: '100%',
                    width: '100%',
                    playerVars: {
                        controls: 1,
                        autoplay: 0,
                        modestbranding: 1,
                        rel: 0
                    }
                });

                players.B = new YT.Player('playerB', {
                    height: '100%',
                    width: '100%',
                    playerVars: {
                        controls: 1,
                        autoplay: 0,
                        modestbranding: 1,
                        rel: 0
                    }
                });

                // Apply initial volumes once players are likely ready
                setTimeout(function() {
                    updateAllVolumes();
                }, 600);
            } catch (err) {
                console.error('DJ Mixer: YouTube player initialization failed.', err);
            }
        }

        /**
         * Toggle mute for a deck
         * @param {string} side - 'A' or 'B'
         */
        function toggleMute(side) {
            if (side !== 'A' && side !== 'B') return;

            muted[side] = !muted[side];

            var btn = document.getElementById('mute' + side + 'Btn');
            if (!btn) return;

            if (muted[side]) {
                btn.textContent = '🔇';
                btn.classList.add('muted');
                btn.setAttribute('aria-label', 'Unmute Track ' + side);
            } else {
                btn.textContent = '🔊';
                btn.classList.remove('muted');
                btn.setAttribute('aria-label', 'Mute Track ' + side);
            }

            updateAllVolumes();
        }

        /**
         * Calculate effective volumes using pro crossfade curve
         * Crossfader: 0 = full A, 50 = both full, 100 = full B
         * Returns effective volumes before mute & master
         */
        function calculateCrossfadeVolumes() {
            // Read sliders safely
            var volASlider = document.getElementById('volA');
            var volBSlider = document.getElementById('volB');
            var crossSlider = document.getElementById('crossfader');

            var volA = (volASlider && !isNaN(parseInt(volASlider.value, 10))) ? parseInt(volASlider.value, 10) : 100;
            var volB = (volBSlider && !isNaN(parseInt(volBSlider.value, 10))) ? parseInt(volBSlider.value, 10) : 100;
            var crossRaw = (crossSlider && !isNaN(parseInt(crossSlider.value, 10))) ? parseInt(crossSlider.value, 10) : 50;

            // Clamp values
            volA = Math.max(0, Math.min(100, volA));
            volB = Math.max(0, Math.min(100, volB));
            crossRaw = Math.max(0, Math.min(100, crossRaw));

            var leftGain, rightGain;

            if (crossRaw <= 50) {
                // Left side: A stays full, B fades in from 0 to 1
                leftGain = 1.0;
                rightGain = crossRaw / 50.0;
            } else {
                // Right side: B stays full, A fades out from 1 to 0
                leftGain = 1.0 - ((crossRaw - 50) / 50.0);
                rightGain = 1.0;
            }

            var effectiveA = volA * leftGain;
            var effectiveB = volB * rightGain;

            return {
                effectiveA: effectiveA,
                effectiveB: effectiveB,
                cross: crossRaw
            };
        }

        /**
         * Master update function - applies all volumes to YouTube players
         */
        function updateAllVolumes() {
            var calc = calculateCrossfadeVolumes();
            var effectiveA = calc.effectiveA;
            var effectiveB = calc.effectiveB;
            var cross = calc.cross;

            // Read master volume
            var masterSlider = document.getElementById('masterVol');
            var master = (masterSlider && !isNaN(parseInt(masterSlider.value, 10))) ? parseInt(masterSlider.value, 10) : 90;
            master = Math.max(0, Math.min(100, master));

            // Apply mute
            var finalA = muted.A ? 0 : effectiveA;
            var finalB = muted.B ? 0 : effectiveB;

            // Apply master
            finalA = Math.round(finalA * master / 100.0);
            finalB = Math.round(finalB * master / 100.0);

            // Clamp final
            finalA = Math.max(0, Math.min(100, finalA));
            finalB = Math.max(0, Math.min(100, finalB));

            // Set YouTube volumes
            if (players.A && typeof players.A.setVolume === 'function') {
                players.A.setVolume(finalA);
            }
            if (players.B && typeof players.B.setVolume === 'function') {
                players.B.setVolume(finalB);
            }

            // Update displays
            updateDisplays(cross, master);
        }

        /**
         * Update all on-screen labels
         */
        function updateDisplays(cross, master) {
            // Volume A display
            var volAValEl = document.getElementById('volAVal');
            if (volAValEl) {
                var volASlider = document.getElementById('volA');
                var rawA = (volASlider && !isNaN(parseInt(volASlider.value, 10))) ? parseInt(volASlider.value, 10) : 100;
                volAValEl.textContent = muted.A ? 'MUTED' : (rawA + '%');
            }

            // Volume B display
            var volBValEl = document.getElementById('volBVal');
            if (volBValEl) {
                var volBSlider = document.getElementById('volB');
                var rawB = (volBSlider && !isNaN(parseInt(volBSlider.value, 10))) ? parseInt(volBSlider.value, 10) : 100;
                volBValEl.textContent = muted.B ? 'MUTED' : (rawB + '%');
            }

            // Master display
            var masterValEl = document.getElementById('masterVal');
            if (masterValEl) {
                masterValEl.textContent = master + '%';
            }

            // Crossfader label
            var fadeLabel = document.getElementById('fadeLabel');
            if (fadeLabel) {
                if (cross <= 3) {
                    fadeLabel.textContent = 'Track A Only';
                } else if (cross >= 97) {
                    fadeLabel.textContent = 'Track B Only';
                } else if (cross >= 47 && cross <= 53) {
                    fadeLabel.textContent = 'Both Full';
                } else if (cross < 50) {
                    fadeLabel.textContent = 'A \u25B8 B';
                } else {
                    fadeLabel.textContent = 'B \u25B8 A';
                }
            }
        }

        /**
         * Search YouTube via serverless API
         * @param {string} side - 'A' or 'B'
         */
        async function search(side) {
            if (side !== 'A' && side !== 'B') return;

            var input = document.getElementById('search' + side);
            if (!input) return;

            var query = input.value.trim();
            if (!query) return;

            var resultsDiv = document.getElementById('results' + side);
            if (!resultsDiv) return;

            // Show loading
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = '<div class="result-item"><div class="info"><div class="title">🔍 Searching...</div></div></div>';

            try {
                var res = await fetch('/api/yt-search?action=search&query=' + encodeURIComponent(query) + '&maxResults=10');

                if (!res.ok) {
                    throw new Error('API returned ' + res.status);
                }

                var data = await res.json();

                if (data.error) {
                    resultsDiv.innerHTML = '<div class="result-item"><div class="info"><div class="title">⚠️ ' + escapeHTML(data.error) + '</div></div></div>';
                    return;
                }

                if (!data.videos || !Array.isArray(data.videos) || data.videos.length === 0) {
                    resultsDiv.innerHTML = '<div class="result-item"><div class="info"><div class="title">😕 No results found</div></div></div>';
                    return;
                }

                renderResults(data.videos, resultsDiv, side);
            } catch (err) {
                resultsDiv.innerHTML = '<div class="result-item"><div class="info"><div class="title">❌ Search failed. Try again.</div></div></div>';
                console.error('DJ Mixer: Search error', err);
            }
        }

        /**
         * Render search results
         */
        function renderResults(videos, container, side) {
            if (!container || !videos) return;

            // Clear
            container.innerHTML = '';

            videos.forEach(function(video) {
                if (!video || !video.id) return;

                var item = document.createElement('div');
                item.className = 'result-item';

                var thumbnail = escapeHTML(video.thumbnail || '');
                var title = escapeHTML(video.title || 'Unknown');
                var channel = escapeHTML(video.channel || 'Unknown');

                item.innerHTML = '<img src="' + thumbnail + '" alt="" loading="lazy"><div class="info"><div class="title">' + title + '</div><div class="channel">' + channel + '</div></div>';

                item.addEventListener('click', function() {
                    loadVideo(side, video.id);
                    // Highlight
                    var allItems = container.querySelectorAll('.result-item');
                    for (var i = 0; i < allItems.length; i++) {
                        allItems[i].classList.remove('active');
                    }
                    item.classList.add('active');
                });

                container.appendChild(item);
            });
        }

        /**
         * Load video into YouTube player
         */
        function loadVideo(side, videoId) {
            if (side !== 'A' && side !== 'B') return;
            if (!videoId) return;

            var player = players[side];
            if (player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(videoId);
            }

            // Hide search results
            var resultsDiv = document.getElementById('results' + side);
            if (resultsDiv) {
                resultsDiv.style.display = 'none';
            }
        }

        /**
         * Escape HTML to prevent XSS
         */
        function escapeHTML(str) {
            if (!str) return '';
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        // Initialize volumes on page load
        window.addEventListener('DOMContentLoaded', function() {
            updateAllVolumes();
        });
    </script>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api" async defer></script>

</body>
</html>
