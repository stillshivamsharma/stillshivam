<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Shivam · DJ Mixer Pro</title>
    <meta name="description" content="Professional DJ Mixer - Crossfade between two YouTube music tracks.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text: #3a2330;
            --text-soft: #5d4155;
            --text-muted: #9b7b8a;
            --card-bg: rgba(255,245,250,0.55);
            --card-border: rgba(255,220,230,0.6);
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Quicksand', sans-serif;
            --accent: #e894a8;
            --accent-dark: #d4788e;
            --shadow: 0 10px 25px rgba(200,130,150,0.08);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: var(--font-sans);
            background: radial-gradient(ellipse at 30% 40%, #ffeef4, #f3e2f0, #e1dff8, #dcedf8);
            background-attachment: fixed;
            min-height: 100vh;
            padding-top: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            color: var(--text);
            line-height: 1.5;
        }

        /* ========== NAVBAR ========== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 0.8rem 0;
            transition: all 0.4s ease;
            border-bottom: 1px solid transparent;
        }

        nav.scrolled {
            background: rgba(255,245,250,0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,200,215,0.4);
            box-shadow: 0 4px 20px rgba(200,140,160,0.08);
        }

        .nav-inner {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-logo {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            font-weight: 500;
            color: #4d2c3b;
            text-decoration: none;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .nav-links {
            display: flex;
            gap: 6px;
            list-style: none;
            align-items: center;
            margin-left: auto;
        }

        .nav-links a {
            color: var(--text-soft);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 50px;
            transition: all 0.3s;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .nav-links a:hover {
            background: rgba(255,220,230,0.5);
            color: #4d2c3b;
        }

        .nav-links .active-link {
            background: rgba(255,210,220,0.5);
            color: #a44b64;
            font-weight: 600;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 36px;
            height: 30px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            z-index: 1001;
        }

        .hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text-soft);
            border-radius: 2px;
            transition: all 0.3s ease;
            margin: 3px 0;
        }

        /* ========== MAIN CARD ========== */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 40px;
            box-shadow: var(--shadow), 0 0 60px rgba(255,180,200,0.05);
            padding: 2rem;
            width: 90%;
            max-width: 1200px;
            margin: 1rem auto 2rem;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            text-align: center;
            color: #4d2c3b;
            margin-bottom: 0.3rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-soft);
            margin-bottom: 1.8rem;
            font-size: 0.95rem;
            font-weight: 400;
        }

        /* ========== DECKS GRID ========== */
        .decks {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .deck {
            background: rgba(255,245,248,0.5);
            border: 1px solid rgba(255,220,230,0.6);
            border-radius: 28px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            transition: border-color 0.3s ease;
        }

        .deck:hover {
            border-color: var(--accent);
        }

        .deck h3 {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            color: #4d2c3b;
            margin-bottom: 0.8rem;
            font-weight: 500;
        }

        /* ========== SEARCH ========== */
        .search-box {
            position: relative;
            display: flex;
            gap: 0.4rem;
            margin-bottom: 0.8rem;
        }

        .search-box input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 28px;
            border: 1px solid rgba(220,150,170,0.4);
            background: rgba(255,245,248,0.7);
            font-family: var(--font-sans);
            font-size: 0.85rem;
            outline: none;
            color: var(--text);
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            background: rgba(255,235,240,0.7);
            box-shadow: 0 0 0 3px rgba(230,130,155,0.1);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        .btn-sm {
            padding: 10px 16px;
            border-radius: 28px;
            border: none;
            background: linear-gradient(145deg, #fad1dd, #f7bacb);
            color: #442433;
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .btn-sm:hover {
            background: linear-gradient(145deg, #fadce6, #f8c0d2);
            transform: translateY(-1px);
        }

        .btn-sm:active {
            transform: scale(0.97);
        }

        /* ========== SEARCH RESULTS ========== */
        .search-results {
            max-height: 280px;
            overflow-y: auto;
            background: rgba(255,250,252,0.95);
            border: 1px solid rgba(220,150,170,0.3);
            border-radius: 18px;
            margin-bottom: 0.8rem;
            display: none;
            padding: 0.4rem;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .search-results::-webkit-scrollbar {
            width: 5px;
        }

        .search-results::-webkit-scrollbar-track {
            background: transparent;
        }

        .search-results::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        .result-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .result-item:hover {
            background: rgba(255,210,225,0.5);
        }

        .result-item.active {
            background: rgba(255,180,200,0.4);
            border: 1px solid var(--accent);
        }

        .result-item img {
            width: 64px;
            height: 36px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .result-item .info {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        .result-item .title {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-item .channel {
            font-size: 0.7rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ========== PLAYER ========== */
        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 14px;
            overflow: hidden;
            background: #1a1a1a;
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ========== CONTROLS ========== */
        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            background: rgba(255,240,245,0.45);
            border: 1px solid rgba(255,220,230,0.4);
            border-radius: 28px;
            padding: 1.2rem;
        }

        .volume-mute-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .vol-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            min-width: 160px;
        }

        .vol-group label {
            font-weight: 600;
            color: var(--text-soft);
            font-size: 0.8rem;
            white-space: nowrap;
            letter-spacing: 0.3px;
            min-width: 45px;
        }

        .vol-group input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
            height: 6px;
            cursor: pointer;
        }

        .vol-group .slider-value {
            font-weight: 600;
            color: #4d2c3b;
            min-width: 45px;
            text-align: right;
            font-size: 0.8rem;
        }

        .mute-btn {
            background: rgba(255,220,230,0.5);
            border: 1px solid rgba(220,150,170,0.5);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            flex-shrink: 0;
            user-select: none;
        }

        .mute-btn:hover {
            background: rgba(255,200,215,0.7);
            transform: scale(1.05);
        }

        .mute-btn.muted {
            background: rgba(200,150,150,0.5);
            border-color: #c44;
            color: #8b0000;
        }

        .crossfader-section {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .crossfader-section span {
            font-weight: 600;
            color: var(--text-soft);
            font-size: 0.85rem;
            user-select: none;
        }

        .crossfader-section input[type="range"] {
            flex: 1;
            accent-color: var(--accent-dark);
            height: 8px;
            cursor: pointer;
        }

        .crossfader-section .fade-label {
            font-weight: 600;
            color: #4d2c3b;
            min-width: 90px;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
        }

        .master-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(220,150,170,0.2);
        }

        .master-row label {
            font-weight: 600;
            color: var(--text-soft);
            font-size: 0.8rem;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .master-row input[type="range"] {
            flex: 1;
            accent-color: var(--accent-dark);
            height: 8px;
            cursor: pointer;
        }

        .master-row .slider-value {
            font-weight: 600;
            color: #4d2c3b;
            min-width: 45px;
            text-align: right;
            font-size: 0.8rem;
        }

        /* ========== BACK LINK ========== */
        .back-link {
            display: inline-block;
            margin-top: 0.5rem;
            color: var(--text-soft);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 8px 18px;
            border-radius: 50px;
            background: rgba(255,220,230,0.3);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255,190,205,0.5);
            color: #4d2c3b;
            transform: translateY(-1px);
        }

        footer {
            padding: 1.5rem 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 900px) {
            .decks {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .volume-mute-row {
                flex-direction: column;
                align-items: stretch;
                gap: 0.6rem;
            }

            .vol-group {
                min-width: auto;
            }

            .glass-card {
                padding: 1.2rem;
                border-radius: 32px;
                width: 95%;
            }

            h1 {
                font-size: 2rem;
            }

            .mute-btn {
                align-self: center;
            }

            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                right: 0;
                width: auto;
                min-width: 160px;
                background: rgba(255,245,250,0.95);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid rgba(255,200,215,0.35);
                border-radius: 20px;
                box-shadow: 0 10px 25px rgba(200,140,160,0.15);
                flex-direction: column;
                padding: 0.8rem;
                gap: 0.3rem;
                z-index: 999;
            }

            .nav-links.show {
                display: flex;
            }

            .nav-links a {
                display: block;
                width: 100%;
                text-align: center;
                padding: 8px 14px;
            }

            .hamburger {
                display: flex;
                margin-left: auto;
            }
        }

        @media (max-width: 480px) {
            body {
                padding-top: 60px;
            }

            .glass-card {
                padding: 0.8rem;
                width: 98%;
            }

            .deck {
                padding: 0.7rem;
            }

            .search-box input {
                font-size: 0.78rem;
                padding: 8px 12px;
            }

            .btn-sm {
                padding: 8px 12px;
                font-size: 0.78rem;
            }

            h1 {
                font-size: 1.6rem;
            }

            .crossfader-section .fade-label {
                min-width: 70px;
                font-size: 0.72rem;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== NAVBAR ==================== -->
    <nav id="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">Shivam Sharma</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="dj-mixer.html" class="active-link">DJ Mixer</a></li>
            </ul>
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- ==================== MAIN CONTAINER ==================== -->
    <div class="glass-card">

        <h1>🎧 DJ Mixer Pro</h1>
        <p class="subtitle">Search YouTube music, load two tracks, crossfade &amp; mix.</p>

        <!-- ==================== DECKS ==================== -->
        <div class="decks">

            <!-- ========== DECK A ========== -->
            <div class="deck" id="deckA">
                <h3>🎵 Track A</h3>
                <div class="search-box">
                    <input type="text" id="searchA" placeholder="Search music..." aria-label="Search Track A" onkeydown="if(event.key==='Enter')search('A')">
                    <button class="btn-sm" onclick="search('A')" aria-label="Search">🔍</button>
                </div>
                <div class="search-results" id="resultsA"></div>
                <div class="player-wrapper" id="playerA"></div>
            </div>

            <!-- ========== DECK B ========== -->
            <div class="deck" id="deckB">
                <h3>🎵 Track B</h3>
                <div class="search-box">
                    <input type="text" id="searchB" placeholder="Search music..." aria-label="Search Track B" onkeydown="if(event.key==='Enter')search('B')">
                    <button class="btn-sm" onclick="search('B')" aria-label="Search">🔍</button>
                </div>
                <div class="search-results" id="resultsB"></div>
                <div class="player-wrapper" id="playerB"></div>
            </div>

        </div>

        <!-- ==================== CONTROLS ==================== -->
        <div class="controls-section">

            <!-- Volume + Mute -->
            <div class="volume-mute-row">
                <div class="vol-group">
                    <label for="volA">🔊 A</label>
                    <input type="range" id="volA" min="0" max="100" value="100" oninput="updateAllVolumes()" aria-label="Volume A">
                    <span class="slider-value" id="volAVal">100%</span>
                </div>
                <button class="mute-btn" id="muteABtn" onclick="toggleMute('A')" aria-label="Mute Track A">🔊</button>

                <div class="vol-group">
                    <label for="volB">🔊 B</label>
                    <input type="range" id="volB" min="0" max="100" value="100" oninput="updateAllVolumes()" aria-label="Volume B">
                    <span class="slider-value" id="volBVal">100%</span>
                </div>
                <button class="mute-btn" id="muteBBtn" onclick="toggleMute('B')" aria-label="Mute Track B">🔊</button>
            </div>

            <!-- Crossfader -->
            <div class="crossfader-section">
                <span>◀ A</span>
                <input type="range" id="crossfader" min="0" max="100" value="50" oninput="updateAllVolumes()" aria-label="Crossfader">
                <span>B ▶</span>
                <span class="fade-label" id="fadeLabel">Center</span>
            </div>

            <!-- Master Volume -->
            <div class="master-row">
                <label for="masterVol">🎛️ Master</label>
                <input type="range" id="masterVol" min="0" max="100" value="90" oninput="updateAllVolumes()" aria-label="Master Volume">
                <span class="slider-value" id="masterVal">90%</span>
            </div>

        </div>
    </div>

    <a href="portfolio.html" class="back-link" aria-label="Back to Portfolio">← back to portfolio</a>
    <footer>— with tenderness, <strong>Shivam</strong> —</footer>

    <!-- ==================== SCRIPTS ==================== -->
    <script>
        // ========== NAVBAR ==========
        (function() {
            var nav = document.getElementById('navbar');
            var hamburger = document.getElementById('hamburger');
            var navLinks = document.getElementById('navLinks');

            window.addEventListener('scroll', function() {
                if (window.scrollY > 30) {
                    nav.classList.add('scrolled');
                } else {
                    nav.classList.remove('scrolled');
                }
            }, { passive: true });

            if (hamburger && navLinks) {
                hamburger.addEventListener('click', function(e) {
                    e.stopPropagation();
                    navLinks.classList.toggle('show');
                });

                document.addEventListener('click', function(e) {
                    if (!hamburger.contains(e.target) && !navLinks.contains(e.target)) {
                        navLinks.classList.remove('show');
                    }
                });
            }
        })();

        // ========== DJ MIXER LOGIC ==========
        var players = Object.create(null);
        var muted = { A: false, B: false };

        function onYouTubeIframeAPIReady() {
            try {
                players.A = new YT.Player('playerA', {
                    height: '100%',
                    width: '100%',
                    playerVars: { controls: 1, autoplay: 0, modestbranding: 1, rel: 0 }
                });
                players.B = new YT.Player('playerB', {
                    height: '100%',
                    width: '100%',
                    playerVars: { controls: 1, autoplay: 0, modestbranding: 1, rel: 0 }
                });
                setTimeout(function() { updateAllVolumes(); }, 600);
            } catch (err) {
                console.error('DJ Mixer: Player init failed.', err);
            }
        }

        function toggleMute(side) {
            if (side !== 'A' && side !== 'B') return;
            muted[side] = !muted[side];
            var btn = document.getElementById('mute' + side + 'Btn');
            if (!btn) return;
            if (muted[side]) {
                btn.textContent = '🔇';
                btn.classList.add('muted');
            } else {
                btn.textContent = '🔊';
                btn.classList.remove('muted');
            }
            updateAllVolumes();
        }

        function calculateCrossfadeVolumes() {
            var volA = clampValue('volA', 100);
            var volB = clampValue('volB', 100);
            var crossRaw = clampValue('crossfader', 50);
            var leftGain, rightGain;
            if (crossRaw <= 50) {
                leftGain = 1.0;
                rightGain = crossRaw / 50.0;
            } else {
                leftGain = 1.0 - ((crossRaw - 50) / 50.0);
                rightGain = 1.0;
            }
            return {
                effectiveA: volA * leftGain,
                effectiveB: volB * rightGain,
                cross: crossRaw
            };
        }

        function clampValue(id, fallback) {
            var el = document.getElementById(id);
            if (!el) return fallback;
            var val = parseInt(el.value, 10);
            if (isNaN(val)) return fallback;
            return Math.max(0, Math.min(100, val));
        }

        function updateAllVolumes() {
            var calc = calculateCrossfadeVolumes();
            var master = clampValue('masterVol', 90);
            var finalA = muted.A ? 0 : Math.round(calc.effectiveA * master / 100);
            var finalB = muted.B ? 0 : Math.round(calc.effectiveB * master / 100);
            finalA = Math.max(0, Math.min(100, finalA));
            finalB = Math.max(0, Math.min(100, finalB));

            if (players.A && typeof players.A.setVolume === 'function') players.A.setVolume(finalA);
            if (players.B && typeof players.B.setVolume === 'function') players.B.setVolume(finalB);

            updateDisplays(calc.cross, master);
        }

        function updateDisplays(cross, master) {
            var volAValEl = document.getElementById('volAVal');
            if (volAValEl) volAValEl.textContent = muted.A ? 'MUTED' : (clampValue('volA', 100) + '%');
            var volBValEl = document.getElementById('volBVal');
            if (volBValEl) volBValEl.textContent = muted.B ? 'MUTED' : (clampValue('volB', 100) + '%');
            var masterValEl = document.getElementById('masterVal');
            if (masterValEl) masterValEl.textContent = master + '%';
            var fadeLabel = document.getElementById('fadeLabel');
            if (fadeLabel) {
                if (cross <= 3) fadeLabel.textContent = 'Track A Only';
                else if (cross >= 97) fadeLabel.textContent = 'Track B Only';
                else if (cross >= 47 && cross <= 53) fadeLabel.textContent = 'Both Full';
                else if (cross < 50) fadeLabel.textContent = 'A ▸ B';
                else fadeLabel.textContent = 'B ▸ A';
            }
        }

        async function search(side) {
            if (side !== 'A' && side !== 'B') return;
            var input = document.getElementById('search' + side);
            if (!input) return;
            var query = input.value.trim();
            if (!query) return;
            var resultsDiv = document.getElementById('results' + side);
            if (!resultsDiv) return;

            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = '<div class="result-item"><div class="info"><div class="title">🔍 Searching...</div></div></div>';

            try {
                // videoCategoryId=10 = Music category for better music results
                var res = await fetch('/api/yt-search?action=search&query=' + encodeURIComponent(query) + '&maxResults=10&category=10');
                if (!res.ok) throw new Error('API returned ' + res.status);
                var data = await res.json();
                if (data.error) {
                    resultsDiv.innerHTML = '<div class="result-item"><div class="info"><div class="title">⚠️ ' + escapeHTML(data.error) + '</div></div></div>';
                    return;
                }
                if (!data.videos || !Array.isArray(data.videos) || data.videos.length === 0) {
                    resultsDiv.innerHTML = '<div class="result-item"><div class="info"><div class="title">😕 No music found</div></div></div>';
                    return;
                }
                renderResults(data.videos, resultsDiv, side);
            } catch (err) {
                resultsDiv.innerHTML = '<div class="result-item"><div class="info"><div class="title">❌ Search failed</div></div></div>';
                console.error('DJ Mixer: Search error', err);
            }
        }

        function renderResults(videos, container, side) {
            container.innerHTML = '';
            videos.forEach(function(video) {
                if (!video || !video.id) return;
                var item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = '<img src="' + escapeHTML(video.thumbnail || '') + '" alt="" loading="lazy"><div class="info"><div class="title">' + escapeHTML(video.title || 'Unknown') + '</div><div class="channel">' + escapeHTML(video.channel || 'Unknown') + '</div></div>';
                item.addEventListener('click', function() {
                    loadVideo(side, video.id);
                    var allItems = container.querySelectorAll('.result-item');
                    for (var i = 0; i < allItems.length; i++) allItems[i].classList.remove('active');
                    item.classList.add('active');
                });
                container.appendChild(item);
            });
        }

        function loadVideo(side, videoId) {
            if (!videoId) return;
            var player = players[side];
            if (player && typeof player.loadVideoById === 'function') player.loadVideoById(videoId);
            var resultsDiv = document.getElementById('results' + side);
            if (resultsDiv) resultsDiv.style.display = 'none';
        }

        function escapeHTML(str) {
            if (!str) return '';
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        window.addEventListener('DOMContentLoaded', function() { updateAllVolumes(); });
    </script>

    <script src="https://www.youtube.com/iframe_api" async defer></script>
